name: Nightly

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  extended-verification:
    name: extended / node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:nightly
      - run: npm run build
      - run: npm pack --dry-run

  tarball-smoke:
    name: tarball smoke
    runs-on: ubuntu-latest
    needs: extended-verification
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack and smoke test local tarball
        shell: bash
        run: |
          set -euo pipefail
          pack_json="$(npm pack --json)"
          tarball="$(node -e "const data = JSON.parse(process.argv[1]); console.log(data[0].filename)" "$pack_json")"
          smoke_dir="$(mktemp -d)"
          npm install "./$tarball" --prefix "$smoke_dir"
          node "$smoke_dir/node_modules/kkauto-skill/dist/cli.js" --version

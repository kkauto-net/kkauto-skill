name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: unit / node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:unit

  integration:
    name: integration / node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test:integration

  security-tests:
    name: security tests / node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test:security
      - run: npm run security:audit

  e2e-cli-sandbox:
    name: e2e cli sandbox / node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:e2e

  build-pack:
    name: build and pack
    runs-on: ubuntu-latest
    needs: [unit, integration, security-tests, e2e-cli-sandbox]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  ci-pass:
    name: ci pass
    runs-on: ubuntu-latest
    needs: [unit, integration, security-tests, e2e-cli-sandbox, build-pack, dependency-review]
    if: always()
    steps:
      - name: Verify required jobs
        shell: bash
        run: |
          set -euo pipefail
          for result in \
            "unit=${{ needs.unit.result }}" \
            "integration=${{ needs.integration.result }}" \
            "security-tests=${{ needs.security-tests.result }}" \
            "e2e-cli-sandbox=${{ needs.e2e-cli-sandbox.result }}" \
            "build-pack=${{ needs.build-pack.result }}"; do
            name="${result%%=*}"
            status="${result#*=}"
            if [ "$status" != "success" ]; then
              printf '%s did not pass: %s\n' "$name" "$status"
              exit 1
            fi
          done

          dependency_review="${{ needs.dependency-review.result }}"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$dependency_review" != "success" ]; then
            printf 'dependency-review did not pass: %s\n' "$dependency_review"
            exit 1
          fi

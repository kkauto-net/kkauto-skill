name: cleanup-artifacts

# Auto-purge GitHub Actions artifacts older than 1 day to control storage usage.
# Runs daily at 02:00 UTC + manual dispatch with optional age override.

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      max_age_days:
        description: 'Delete artifacts older than N days (default 1)'
        required: false
        default: '1'
      dry_run:
        description: 'Preview deletions without deleting artifacts'
        required: false
        default: 'true'
        type: boolean
      confirm_delete:
        description: 'Type DELETE to run manual deletion when dry_run is false'
        required: false
        default: ''

concurrency:
  group: cleanup-artifacts
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        env:
          MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days || '1' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
          CONFIRM_DELETE: ${{ github.event.inputs.confirm_delete || '' }}
        with:
          script: |
            const maxAgeDaysInput = String(process.env.MAX_AGE_DAYS || '1').trim();
            if (!/^\d+$/.test(maxAgeDaysInput)) {
              throw new Error('max_age_days must be a positive integer');
            }

            const maxAgeDays = Number(maxAgeDaysInput);
            if (maxAgeDays < 1) {
              throw new Error('max_age_days must be greater than or equal to 1');
            }
            if (maxAgeDays > 90) {
              throw new Error('max_age_days must be less than or equal to 90');
            }

            const dryRun = String(process.env.DRY_RUN || 'false').toLowerCase() === 'true';
            if (context.eventName === 'workflow_dispatch' && !dryRun && process.env.CONFIRM_DELETE !== 'DELETE') {
              throw new Error('Manual deletion requires confirm_delete=DELETE when dry_run is false');
            }

            const cutoff = Date.now() - maxAgeDays * 24 * 60 * 60 * 1000;
            core.info(`${dryRun ? 'Previewing purge of' : 'Purging'} artifacts older than ${maxAgeDays} day(s) - cutoff ${new Date(cutoff).toISOString()}`);

            let page = 1;
            const artifacts = [];
            let deleted = 0;
            let wouldDelete = 0;
            let failed = 0;
            let kept = 0;
            let bytesFreed = 0;

            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page,
              });
              if (data.artifacts.length === 0) break;
              artifacts.push(...data.artifacts);
              if (data.artifacts.length < 100) break;
              page++;
            }

            for (const artifact of artifacts) {
              const createdAt = new Date(artifact.created_at).getTime();
              if (createdAt >= cutoff) {
                kept++;
                continue;
              }

              const sizeInBytes = artifact.size_in_bytes || 0;
              if (dryRun) {
                wouldDelete++;
                bytesFreed += sizeInBytes;
                core.info(`Would delete #${artifact.id} ${artifact.name} (age ${(((Date.now() - createdAt) / 86400000)).toFixed(1)}d, ${(sizeInBytes / 1024 / 1024).toFixed(2)} MB)`);
                continue;
              }

              try {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                deleted++;
                bytesFreed += sizeInBytes;
                core.info(`Deleted #${artifact.id} ${artifact.name} (age ${(((Date.now() - createdAt) / 86400000)).toFixed(1)}d, ${(sizeInBytes / 1024 / 1024).toFixed(2)} MB)`);
              } catch (err) {
                failed++;
                core.warning(`Failed #${artifact.id}: ${err.message}`);
              }
            }

            if (failed > 0) {
              core.setFailed(`Failed to delete ${failed} artifact(s)`);
            }

            core.notice(`Done - ${dryRun ? `would delete ${wouldDelete}` : `deleted ${deleted}`}, kept ${kept}, failed ${failed}, ${dryRun ? 'would free' : 'freed'} ${(bytesFreed / 1024 / 1024).toFixed(2)} MB`);
            await core.summary
              .addHeading('Artifact cleanup summary')
              .addTable([
                [{ data: 'Metric', header: true }, { data: 'Value', header: true }],
                ['Max age (days)', String(maxAgeDays)],
                ['Dry run', String(dryRun)],
                ['Would delete', String(wouldDelete)],
                ['Deleted', String(deleted)],
                ['Kept', String(kept)],
                ['Failed', String(failed)],
                ['Freed (MB)', (bytesFreed / 1024 / 1024).toFixed(2)],
              ])
              .write();
